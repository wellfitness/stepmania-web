<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sincro — Suite rítmica</title>
<meta name="theme-color" content="#00bec8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Sincro: suite de juego rítmico para alfombra de baile y guitarra Guitar Hero. Juega, crea coreografías y prueba tu hardware.">
<link rel="canonical" href="https://play.movimientofuncional.app/app.html">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
<script src="stepmania-web/js/pwa-bootstrap.js"></script>
<style>
  :root {
    --shell-bg: #0f172a;
    --shell-surface: #1e293b;
    --shell-border: rgba(0, 190, 200, 0.18);
    --shell-fg: #e2e8f0;
    --shell-muted: #94a3b8;
    --shell-accent: #00bec8;
    --shell-accent-2: #fbbf24;
    --shell-active: rgba(0, 190, 200, 0.22);
    --shell-h: 56px;
    --rosa-neon: #ff2d92;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--shell-bg);
    color: var(--shell-fg);
    font-family: 'ABeeZee', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .shell-topbar {
    flex: 0 0 var(--shell-h);
    height: var(--shell-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    background: linear-gradient(180deg, var(--shell-surface) 0%, var(--shell-bg) 100%);
    border-bottom: 1px solid var(--shell-border);
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
    z-index: 10;
  }
  .shell-brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    height: 46px;
    text-decoration: none;
    line-height: 1;
  }
  .shell-brand img {
    height: 100%;
    width: auto;
    display: block;
    filter: drop-shadow(0 0 4px rgba(0, 190, 200, 0.35)) drop-shadow(0 0 6px rgba(250, 204, 21, 0.25));
  }
  .shell-brand .wordmark {
    font-family: 'Righteous', system-ui, sans-serif;
    font-size: 31px;
    line-height: 1;
    color: #fff;
    letter-spacing: 1.5px;
    -webkit-text-stroke: 1px var(--rosa-neon);
    text-shadow:
      0 0 4px #fff,
      0 0 8px var(--rosa-neon),
      0 0 18px var(--rosa-neon),
      0 0 28px rgba(255, 45, 146, 0.6);
  }

  .shell-byline {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    margin-right: auto;
    margin-left: -4px;
    padding-left: 10px;
    border-left: 1px solid var(--shell-border);
    font-family: 'ABeeZee', system-ui, sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--shell-muted);
    text-decoration: none;
    white-space: nowrap;
    transition: color 120ms ease;
  }
  .shell-byline em {
    font-style: normal;
    font-weight: 400;
    letter-spacing: 0.8px;
    color: var(--shell-muted);
    opacity: 0.75;
  }
  .shell-byline strong {
    font-weight: 700;
    color: var(--shell-fg);
  }
  .shell-byline:hover strong { color: var(--shell-accent); }

  .shell-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--shell-accent) transparent;
  }
  .shell-nav::-webkit-scrollbar { height: 4px; }
  .shell-nav::-webkit-scrollbar-thumb { background: var(--shell-accent); border-radius: 2px; }
  .shell-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 10px;
    color: var(--shell-muted);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    transition: background 120ms ease, color 120ms ease;
  }
  .shell-nav a:hover { color: var(--shell-fg); background: rgba(255,255,255,0.04); }
  .shell-nav a.active {
    color: var(--shell-fg);
    background: var(--shell-active);
    box-shadow: inset 0 0 0 1px var(--shell-border);
  }

  .shell-actions { display: flex; gap: 8px; align-items: center; }
  .shell-install {
    appearance: none;
    border: 1px solid var(--shell-accent);
    background: transparent;
    color: var(--shell-accent);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 120ms ease;
  }
  .shell-install:hover { background: rgba(0, 190, 200, 0.12); }
  .shell-install[hidden] { display: none; }

  .shell-main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--shell-bg);
  }
  .shell-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--shell-bg);
  }

  .shell-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: var(--shell-muted);
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .shell-loading[hidden] { opacity: 0; }
  .shell-loading::before {
    content: '';
    width: 32px;
    height: 32px;
    border: 3px solid var(--shell-border);
    border-top-color: var(--shell-accent);
    border-radius: 50%;
    animation: shell-spin 800ms linear infinite;
  }
  @keyframes shell-spin { to { transform: rotate(360deg); } }

  /* Mobile: encoge brand y oculta texto en links salvo el activo */
  @media (max-width: 640px) {
    .shell-topbar { gap: 6px; padding: 0 8px; }
    .shell-brand { height: 34px; gap: 8px; margin-right: auto; }
    .shell-brand .wordmark { font-size: 24px; }
    .shell-byline { display: none; }
    .shell-nav a { padding: 8px 10px; font-size: 13px; }
    .shell-install { padding: 6px 10px; font-size: 12px; }
  }

  /* Standalone PWA: aprovecha el área de window-controls-overlay */
  @media (display-mode: window-controls-overlay) {
    .shell-topbar {
      padding-left: env(titlebar-area-x, 16px);
      padding-right: calc(100vw - env(titlebar-area-width, 100vw) - env(titlebar-area-x, 0px) + 16px);
      app-region: drag;
    }
    .shell-brand, .shell-byline, .shell-nav, .shell-actions { app-region: no-drag; }
  }
</style>
</head>
<body>
  <header class="shell-topbar" role="banner">
    <a class="shell-brand" href="#/play" aria-label="Sincro · Inicio">
      <img src="sincro-logo-img-transp.webp" alt="" width="852" height="402" decoding="async" aria-hidden="true">
      <span class="wordmark">Sincro</span>
    </a>
    <a class="shell-byline" href="https://movimientofuncional.com" target="_blank" rel="noopener" aria-label="Movimiento Funcional — web principal"><em>by</em> <strong>Movimiento Funcional</strong></a>
    <nav class="shell-nav" aria-label="Navegación principal">
      <a href="#/play"           data-route="/play">⌂ Inicio</a>
      <a href="#/stepmania-play" data-route="/stepmania-play">🦶 Bailar</a>
      <a href="#/gh-play"        data-route="/gh-play">🎸 Tocar</a>
      <a href="#/test-pad"       data-route="/test-pad">🛠️ Equipo</a>
      <a href="#/tutorial"       data-route="/tutorial">ℹ️ Ayuda</a>
    </nav>
    <div class="shell-actions">
      <button id="installBtn" class="shell-install" hidden type="button">Instalar app</button>
    </div>
  </header>
  <main class="shell-main">
    <iframe id="shellFrame"
            class="shell-frame"
            name="sincro-shell-frame"
            title="Sincro — vista activa"
            allow="gamepad; fullscreen; autoplay; microphone; midi; clipboard-write"
            allowfullscreen></iframe>
    <div id="shellLoading" class="shell-loading">Cargando…</div>
  </main>
<script>
  // Shell SPA — router de hash a iframe.
  // Cada ruta carga el HTML clásico dentro del iframe; el bootstrap del HTML
  // detecta window.name === 'sincro-shell-frame' y oculta su topbar interno
  // (regla CSS inyectada por pwa-bootstrap.js cuando in-shell=true).
  //
  // Gamepad API funciona en iframes same-origin sin permisos extra. Web
  // Audio + fullscreen requieren gesto de usuario originado en el iframe
  // — los handlers de cada juego ya cumplen esto (botón "Iniciar" antes de
  // empezar). El atributo allow="gamepad; fullscreen; autoplay" desbloquea
  // las features delegadas al iframe.
  (function () {
    'use strict';
    // Targets RELATIVOS al app.html (no absolutos con "/"). Esto permite que
    // el shell funcione tanto en file:// (doble click sobre index.html) como
    // en http(s):// — los paths absolutos "/foo.html" resolverían a la raíz
    // del disco bajo file://, que no contiene los HTML.
    // /play apunta al DASHBOARD (play.html) que ahora es solo el menú de
    // cards. Para arrancar directamente en el motor DDR usar /stepmania-play.
    // tutorial.html vive como archivo propio — accesible desde las cards del
    // dashboard, no se promociona en el topbar para no inflar la nav.
    //
    // /calibration apunta directamente al test-pad con el hash que activa el
    // tab "Sync de audio" (la calibración de audio se fusionó allí en
    // 2026-05-12). Mantener la ruta preserva deep-links externos
    // (#/calibration sigue resolviendo a una página útil).
    var ROUTES = {
      '/play':           'play.html',
      '/stepmania-play': 'stepmania-play.html',
      '/gh-play':        'gh-play.html',
      '/autostepper':    'autostepper.html',
      '/gh-autostepper': 'gh-autostepper.html',
      '/test-pad':       'test-pad.html',
      '/tutorial':       'tutorial.html',
      '/calibration':    'test-pad.html#alfombra-sync',
      '/about':          'index.html'
    };
    var DEFAULT_ROUTE = '/play';

    var frame   = document.getElementById('shellFrame');
    var loading = document.getElementById('shellLoading');
    var navLinks = Array.prototype.slice.call(document.querySelectorAll('.shell-nav a'));

    function currentRoute() {
      var h = (location.hash || '').replace(/^#/, '');
      return Object.prototype.hasOwnProperty.call(ROUTES, h) ? h : DEFAULT_ROUTE;
    }

    function setActive(route) {
      navLinks.forEach(function (a) {
        a.classList.toggle('active', a.dataset.route === route);
      });
    }

    function navigate() {
      var route = currentRoute();
      var url   = ROUTES[route];
      // Solo cambia src si cambió la ruta — evita reload innecesarios cuando
      // el usuario hace click en el link de la ruta activa.
      if (frame.dataset.route !== route) {
        loading.hidden = false;
        frame.dataset.route = route;
        frame.src = url;
      }
      setActive(route);
      document.title = 'Sincro · ' + route.slice(1).replace('-', ' ');
    }

    frame.addEventListener('load', function () {
      loading.hidden = true;
    });

    window.addEventListener('hashchange', navigate);

    // Click handler explícito para los links del nav.
    //
    // Por qué no basta con el default action de <a href="#/foo">:
    // cuando el iframe tiene el foco (juego activo, modal abierto, fullscreen
    // invocado por la herramienta) el navegador a veces consume el primer
    // click del topbar solo para devolver foco al parent — el <a> se queda
    // sin disparar la navegación. Interceptar manualmente con preventDefault
    // + window.focus() + asignación directa de location.hash garantiza que
    // el segundo paso (navegación) ocurra siempre, no solo cuando el parent
    // ya tenía foco.
    navLinks.forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var route = a.dataset.route;
        window.focus();
        if (location.hash === '#' + route) {
          navigate();
        } else {
          location.hash = '#' + route;
        }
      });
    });

    // Asegura que haya hash al entrar — start_url=/app.html sin hash debe
    // resolver a la ruta default (/play).
    if (!location.hash) location.replace('#' + DEFAULT_ROUTE);
    else navigate();

    // Botón de instalación PWA — bootstrap dispara 'sincro-pwa-installable'
    // cuando el navegador tiene el prompt deferido disponible.
    var installBtn = document.getElementById('installBtn');
    document.addEventListener('sincro-pwa-installable', function () {
      installBtn.hidden = false;
    });
    document.addEventListener('sincro-pwa-installed', function () {
      installBtn.hidden = true;
    });
    installBtn.addEventListener('click', function () {
      if (!window.SincroPWA || !window.SincroPWA.canInstall()) return;
      window.SincroPWA.promptInstall().then(function (choice) {
        if (choice && choice.outcome === 'accepted') installBtn.hidden = true;
      });
    });

    // Si la PWA ya está instalada, oculta el botón aunque dispare más tarde.
    if (window.SincroPWA && window.SincroPWA.isInstalled()) {
      installBtn.hidden = true;
    }
  })();
</script>
</body>
</html>
